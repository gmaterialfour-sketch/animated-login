<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PMO Login Preview</title>
  <link rel="stylesheet" href="themes/pmo-theme/login/resources/assets/css/modern-effects.css?v=1.4">
  <link rel="shortcut icon" type="image/png" href="themes/pmo-theme/login/resources/assets/images/logos/favicon.png?v=2">
  <link rel="icon" type="image/png" href="themes/pmo-theme/login/resources/assets/images/logos/favicon.png?v=2">
</head>
<body>
  <main class="pmo-login">
    <!-- Background -->
    <video class="background-video" autoplay muted loop playsinline preload="auto">
      <source src="themes/pmo-theme/login/resources/assets/animations/login-background.mp4" type="video/mp4">
    </video>
    <div class="background-poster" aria-hidden="true"></div>
    <canvas id="pmo-3d-scene" class="three-scene" aria-hidden="true"></canvas>
    <div class="background-shade" aria-hidden="true"></div>
    <div class="overlay"></div>

    <!-- Top Branding -->
    <header class="brand-bar">
      <img class="jakson-logo" src="themes/pmo-theme/login/resources/assets/images/logos/jkg-w.png" alt="Jakson Green">
      <img class="energix-logo" src="themes/pmo-theme/login/resources/assets/images/logos/energxiq-w.png" alt="energxIQ">
    </header>

    <!-- Main Layout -->
    <div class="container">
      <!-- LEFT (Hero) -->
      <section class="intro-panel" aria-label="PMO Master Access">
        <div class="access-title">
          <span class="access-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 11c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 13c-2.209 0-4 1.791-4 4v2h8v-2c0-2.209-1.791-4-4-4z" />
            </svg>
          </span>
          PMO MASTER ACCESS
        </div>
        <h1>Precision in <br> Project Management.</h1>
        <p>
          Access the central hub for Daily Progress Reports, procurement tracking, and cross-functional commissioning for Phase II Infrastructure developments.
        </p>
      </section>

      <!-- RIGHT (Login) -->
      <section class="login-panel">
        <div class="pmo-card">
          <div class="card-icon animated-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <path d="m9 12 2 2 4-4" />
            </svg>
          </div>
          <h2>Login</h2>
          <p class="login-subtitle">Hi, Welcome back</p>

          <form id="kc-form-login" action="#" method="post">
            <div class="field-group">
              <label for="username">Your user Name</label>
              <div class="input-shell">
                <span class="input-icon">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M12 12.2a4.2 4.2 0 1 0 0-8.4 4.2 4.2 0 0 0 0 8.4Zm0 2.1c-4.1 0-7.4 2.1-7.4 4.7v1.1h14.8V19c0-2.6-3.3-4.7-7.4-4.7Z"/>
                  </svg>
                </span>
                <input id="username" name="username" type="text" placeholder="employee@company.com" autocomplete="username">
              </div>
            </div>

            <div class="field-group">
              <label for="password">Secure Password</label>
              <div class="input-shell">
                <span class="input-icon">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7 0V7a2 2 0 1 1 4 0v2h-4Zm3 7.7V18h-2v-1.3a2 2 0 1 1 2 0Z"/>
                  </svg>
                </span>
                <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password">
                <button type="button" class="password-toggle" aria-label="Show password">
                  <svg class="eye-open" viewBox="0 0 24 24" focusable="false">
                    <path d="M12 5c5 0 8.7 4.2 10 7-1.3 2.8-5 7-10 7s-8.7-4.2-10-7c1.3-2.8 5-7 10-7Zm0 2C8.5 7 5.7 9.6 4.3 12c1.4 2.4 4.2 5 7.7 5s6.3-2.6 7.7-5C18.3 9.6 15.5 7 12 7Zm0 2.1a2.9 2.9 0 1 1 0 5.8 2.9 2.9 0 0 1 0-5.8Z"/>
                  </svg>
                  <svg class="eye-closed" viewBox="0 0 24 24" focusable="false">
                    <path d="m3.3 2 18.4 18.4-1.4 1.4-3.2-3.2A10.4 10.4 0 0 1 12 20c-5 0-8.7-4.2-10-8a14.8 14.8 0 0 1 4-5.1L1.9 3.4 3.3 2Zm6.1 8.1a2.9 2.9 0 0 0 3.6 3.6l-3.6-3.6ZM12 4c5 0 8.7 4.2 10 8a14.6 14.6 0 0 1-3 4.2l-2.2-2.2A5 5 0 0 0 10 7.2L8.2 5.4C9.3 4.5 10.6 4 12 4Z"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-row">
              <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="submit-btn">
              <span>Log in</span>
            </button>

            <div class="security-note">
              <span class="secure-line"></span>
              <span class="secure-text">SECURE AREA</span>
              <span class="secure-line"></span>
            </div>
          </form>
        </div>
      </section>
    </div>
  </main>

  <script src="themes/pmo-theme/login/resources/assets/js/modern-animations.js?v=1.4" type="module"></script>
</body>
</html>
